<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Tracker App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="loginPage" class="login-container">
    <div class="login-box">
        <h1>Fitness Tracker</h1>
        <p>Track your health journey</p>

        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</div>

<!-- APP -->
<div id="mainApp" class="main-app" style="display:none;">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <button data-page="dashboard">Dashboard</button>
        <button data-page="food">Food</button>
        <button data-page="workout">Workout</button>
        <button data-page="goals">Goals</button>
        <button data-page="water">Water</button>
        <button onclick="logout()">Logout</button>
    </aside>

    <!-- CONTENT -->
    <main class="content">

        <section id="dashboard" class="page active">
            <h1>Dashboard</h1>
            <div id="weightProgress">No data yet</div>
        </section>

        <section id="food" class="page">
            <h1>Food</h1>
            <button onclick="addFoodPrompt()">Add Food</button>
            <div id="foodList"></div>
        </section>

        <section id="workout" class="page">
            <h1>Workout</h1>
            <button onclick="addWorkoutPrompt()">Add Workout</button>
            <div id="workoutList"></div>
        </section>

        <section id="goals" class="page">
            <h1>Goals</h1>
            <button onclick="addGoalPrompt()">Add Goal</button>
            <div id="goalsList"></div>
        </section>

        <section id="water" class="page">
            <h1>Water Tracker</h1>
            <button onclick="addWater()">+ Water</button>
            <button onclick="removeWater()">- Water</button>
            <div id="waterCount">0 / 8</div>
        </section>

    </main>
</div>

<script src="script.js"></script>
</body>
</html>
